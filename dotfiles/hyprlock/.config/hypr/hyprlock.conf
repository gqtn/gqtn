# Aplica a captura de tela com blur em TODAS as saídas
background {
    monitor = 
    path = screenshot
    blur_passes = 2
    blur_size = 5
}

# Relógio APENAS na saída DP-1
label {
    monitor = eDP-1
    text = $TIME
    color = rgba(255, 255, 255, 1.0)
    font_size = 80
    position = 0, 150
    halign = center
    valign = center
}

# Sobreposição do ícone APENAS na saída DP-1
image {
    monitor = eDP-1
    path = ~/.config/sway/icon.png
    size = 350
    position = 350, 100
    halign = center
    valign = center
}

# Indicador de digitação da senha APENAS na saída DP-1
input-field {
    monitor = eDP-1
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.33
    position = 0, -100
    halign = center
    valign = center
}
