[module/battery]
type = internal/battery

full-at = 94
low-at = 5

battery = BAT0
adapter = ADP1

poll-interval = 5

time-format = %H:%M

format-charging = <animation-charging> 
format-discharging = <ramp-capacity> 

label-charging = %percentage%%
label-discharging = %percentage%%
label-full = %{F#50FA7B}’ēĆ %{F}
label-low = %{F#FF5555}’ēä %{F}

ramp-capacity-0 = %{F#FF5555}’ēä %{F}
ramp-capacity-1 = %{F#FF5555}’ēā %{F}
ramp-capacity-2 = %{F#FFB86C}’ēé %{F}
ramp-capacity-3 = %{F#FFB86C}’ēü %{F}
ramp-capacity-4 = %{F#FFB86C}’ēĆ %{F}

bar-capacity-width = 10

animation-charging-0 = ’ēä
animation-charging-1 = ’ēā
animation-charging-2 = ’ēé
animation-charging-3 = ’ēü
animation-charging-4 = ’ēĆ
animation-charging-framerate = 750

animation-discharging-0 = ’ēĆ
animation-discharging-1 = ’ēü
animation-discharging-2 = ’ēé
animation-discharging-3 = ’ēā
animation-discharging-4 = ’ēä
animation-discharging-framerate = 500

animation-low-0 = !
animation-low-1 = 
animation-low-framerate = 200
