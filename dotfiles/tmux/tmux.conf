# ==========================================
# 1. CONFIGURAÇÕES GERAIS
# ==========================================
set -g mouse on
set -g mode-keys vi
set -s set-clipboard on
set -g allow-rename off
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",alacritty:RGB"
set -g destroy-unattached on

# Desativa alertas visuais para manter a barra limpa
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# ==========================================
# 2. ATALHOS DE TECLADO (BINDS)
# ==========================================
# Recarregar configuração (Prefix + r)
bind r source-file ~/.tmux.conf \; display-message "Configuração recarregada!"

# Navegação entre painéis (Vim style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Modo Resize (Prefix + Ctrl-r)
bind C-r switch-client -T resize
bind -T resize h resize-pane -L 5 \; switch-client -T resize
bind -T resize j resize-pane -D 5 \; switch-client -T resize
bind -T resize k resize-pane -U 5 \; switch-client -T resize
bind -T resize l resize-pane -R 5 \; switch-client -T resize
bind -T resize Escape switch-client -T root
bind -T resize Enter switch-client -T root

# ==========================================
# 3. INTERAÇÃO COM MOUSE (VOLUME)
# ==========================================
# Clique para Mute e Scroll para Volume (apenas no lado direito da barra)
bind-key -n MouseDown1StatusRight run-shell "pamixer -t ; tmux refresh-client -S"
bind-key -n WheelUpStatusRight run-shell "pamixer -i 5 ; tmux refresh-client -S"
bind-key -n WheelDownStatusRight run-shell "pamixer -d 5 ; tmux refresh-client -S"

# ==========================================
# 4. ESTILOS VISUAIS (PAINÉIS E ALERTAS)
# ==========================================
set -g pane-border-style 'fg=red'
set -g pane-active-border-style 'fg=yellow'
set -g message-style 'fg=yellow bg=red bold'
setw -g clock-mode-colour yellow
setw -g mode-style 'fg=black bg=red bold'

# ==========================================
# 5. BARRA DE STATUS (LAYOUT E SEPARAÇÃO)
# ==========================================
set -g status-position bottom
set -g status-justify left
# Atualiza a cada 2 segundos (ajustado para o 'top' não consumir muita CPU do próprio terminal)
set -g status-interval 2
set -g status-style 'fg=red'

# --- LADO ESQUERDO ---
set -g status-left ''
set -g status-left-length 10

# --- JANELAS (ABAS) ---
# Estilo Inativo
setw -g window-status-style 'fg=red bg=black'
setw -g window-status-format ' #I #[fg=white]#W #[fg=yellow]#F '

# Estilo Ativo: CAIXAS VERMELHAS SEPARADAS (Aba + Arch + RAM + CPU)
setw -g window-status-current-style 'fg=default,bg=default'
setw -g window-status-current-format '#[fg=black,bg=red] #I #W #F #[default]'  


# #[fg=black,bg=red] Arch: #(~/.tmux-updates.sh) #[default]  #[fg=black,bg=red] RAM: #(free | awk '\''/Mem/ {print $3/$2 * 100}'\'' | cut -d. -f1)%% #[default]  #[fg=black,bg=red] CPU: #(top -bn1 | grep Cpu | awk '\''{print $2}'\'' | cut -d. -f1)%% '

# --- LADO DIREITO ---
# Caixas Amarelas Separadas
set -g status-right-style 'none'
set -g status-right-length 100
set -g status-right '#[fg=black,bg=yellow] Bat: #(cat /sys/class/power_supply/BAT0/capacity)%% #[default]  #[fg=black,bg=yellow] Vol: #(pamixer --get-volume-human) #[default]  #[fg=black,bg=yellow] %H:%M '
